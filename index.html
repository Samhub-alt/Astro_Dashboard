<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam Astro | Financial Dashboard</title>
    <style>
        :root {
            /* Premium Dark Mode Trading Terminal Colors */
            --bg-dark: #0B0E14;
            --card-bg: #151A22;
            --text-main: #E2E8F0;
            --text-muted: #8B949E;
            --accent-gold: #D4AF37;
            --accent-purple: #8B5CF6;
            --border-color: #2E3340;
            --green-up: #10B981;
            --red-down: #EF4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            max-width: 950px;
            width: 100%;
        }

        /* --- Header & Calendar --- */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .brand {
            color: var(--accent-gold);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .date-picker {
            background-color: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
        }

        .date-picker:focus { border-color: var(--accent-purple); }
        .date-picker::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* --- Global Card Styles --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #D4AF37, #9B7B1B);
            color: #0B0E14;
            text-align: center;
            font-weight: 800;
            padding: 6px 20px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        /* --- Top Summary Card --- */
        .top-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .moon-icon {
            width: 70px;
            height: 70px;
            background-color: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-purple);
            font-size: 2rem;
            border: 2px solid var(--border-color);
        }

        .summary-text h2 {
            margin: 0 0 5px 0;
            color: var(--accent-gold);
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .summary-text p {
            margin: 4px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .key-events-btn {
            background-color: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* --- Grid Layout for Bottom Section --- */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* --- Timeline Styles (Green Area) --- */
        .timeline {
            list-style: none;
            padding: 0 0 0 10px;
            margin: 0;
            border-left: 1px dashed var(--border-color);
        }

        .timeline li {
            position: relative;
            padding-left: 25px;
            padding-bottom: 25px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .timeline li:last-child { padding-bottom: 0; border-left: none; }

        .timeline li::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid var(--text-muted);
        }

        .timeline li.market-open::before { border-color: var(--green-up); background: var(--green-up); }
        .timeline li.market-close::before { border-color: var(--red-down); background: var(--red-down); }
        .timeline li.important::before { border-color: var(--accent-gold); box-shadow: 0 0 8px rgba(212, 175, 55, 0.6); }

        .time-label {
            font-weight: bold;
            color: var(--accent-gold);
            margin-right: 12px;
            font-family: monospace;
            font-size: 1.05rem;
        }

        .sub-text {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* --- Table Styles (Blue Area) --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        td {
            padding: 12px 5px;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
        }

        td:first-child { color: var(--text-muted); font-weight: 600; width: 30%; }
        td:nth-child(2) { color: var(--text-main); font-family: monospace; font-size: 1.05rem; text-align: left; }
        td:last-child { text-align: right; color: var(--accent-purple); font-weight: 500;}

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .bottom-grid { grid-template-columns: 1fr; }
            .top-summary { flex-direction: column; text-align: center; gap: 20px; }
            .header-controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <!-- Header with Sam Astro Brand and Calendar -->
    <div class="header-controls">
        <div class="brand">Sam - Astro</div>
        <input type="date" id="calendar-picker" class="date-picker">
    </div>

    <!-- Top Summary Card -->
    <div class="card top-summary">
        <div class="moon-icon">☾</div>
        <div class="summary-text">
            <p style="text-transform: uppercase; font-size: 0.8rem; font-weight: bold; color: var(--accent-purple); letter-spacing: 1px;">Moon Nakshatra Outlook</p>
            <h2 id="live-nakshatra">Loading...</h2>
            <p id="nakshatra-details">Calculating transition times...</p>
            <p style="color: var(--text-main);" id="tithi-details">Analyzing Lunar Phase</p>
        </div>
        <div class="key-events-btn">
            <span id="event-count">0</span> KEY EVENTS<br><span style="font-weight: normal; font-size: 0.8rem; color: var(--text-main);">Scheduled</span>
        </div>
    </div>

    <!-- Bottom Grid Layout -->
    <div class="bottom-grid">
        
        <!-- Left Column: Timeline (Green Area) -->
        <div class="card">
            <div class="card-header">IST Market Timeline</div>
            <ul class="timeline" id="timeline-list">
                <!-- Javascript will auto-generate timeline events here based on calendar date -->
            </ul>
        </div>

        <!-- Right Column: Planetary Snapshot (Blue Area) -->
        <div class="card">
            <div class="card-header">Planetary Snapshot</div>
            <table>
                <tbody id="planetary-table">
                    <!-- Javascript will auto-generate planets here based on calendar date -->
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- ========================================== -->
<!-- FINANCIAL ASTROLOGY JAVASCRIPT ENGINE      -->
<!-- ========================================== -->
<script>
    // --- Data Arrays ---
    const planets = ["Sun", "Moon", "Mercury", "Venus", "Mars", "Jupiter", "Saturn", "Rahu", "Ketu"];
    const zodiacs = ["Ari", "Tau", "Gem", "Can", "Leo", "Vir", "Lib", "Sco", "Sag", "Cap", "Aqu", "Pis"];
    const nakshatras = ["Ashwini", "Bharani", "Krittika", "Rohini", "Mrigashira", "Ardra", "Punarvasu", "Pushya", "Ashlesha", "Magha", "Purva Phalguni", "Uttara Phalguni", "Hasta", "Chitra", "Swati", "Vishakha", "Anuradha", "Jyeshtha", "Mula", "Purva Ashadha", "Uttara Ashadha", "Shravana", "Dhanishta", "Shatabhisha", "Purva Bhadrapada", "Uttara Bhadrapada", "Revati"];

    // --- Core Architecture Setup ---
    const datePicker = document.getElementById('calendar-picker');
    
    // Set Calendar to Today initially
    const today = new Date().toISOString().split('T')[0];
    datePicker.value = today;

    // Listen for Date Changes from the user
    datePicker.addEventListener('change', function() {
        processDashboardUpdate(this.value);
    });

    // --- Main Processing Function ---
    async function processDashboardUpdate(selectedDate) {
        /*
        ======================================================================
        API INTEGRATION ZONE (VEDASTRO API)
        When you are ready for real data, uncomment the fetch request below.
        The free API allows 15 requests per minute without a key.
        ======================================================================
        */
        try {
            // const response = await fetch(`https://api.vedastro.org/api/Calculate/AllPlanetData/Location/Kalyan/Time/09:15/${selectedDate}/+05:30`);
            // const apiData = await response.json();
            // renderRealData(apiData); 
            
            // For now, we route to our internal algorithmic generator so the 
            // dashboard works perfectly and visually out of the box.
            const generatedData = algorithmicAstroGenerator(selectedDate);
            renderDashboard(generatedData);

        } catch (error) {
            console.error("Data processing failed:", error);
        }
    }

    // --- Internal Algorithm Generator (Ensures 100% Uptime for Prototyping) ---
    // This creates consistent, realistic data based purely on the date you select.
    function algorithmicAstroGenerator(dateString) {
        const dateSeed = new Date(dateString).getTime() / 100000;
        
        // Helper function for consistent pseudo-random math based on date
        const prng = (offset) => {
            let x = Math.sin(dateSeed + offset) * 10000;
            return x - Math.floor(x);
        };

        // 1. Generate Planet Degrees (Blue Area)
        let planetData = [];
        planets.forEach((planet, index) => {
            let deg = (prng(index) * 30).toFixed(1);
            let sign = zodiacs[Math.floor(prng(index + 10) * 12)];
            let nak = nakshatras[Math.floor(prng(index + 20) * 27)];
            let pada = Math.floor(prng(index + 30) * 4) + 1;
            let retro = (planet === "Rahu" || planet === "Ketu" || prng(index + 40) > 0.8) ? " R" : "";
            
            planetData.push({ name: planet, degree: `${deg}° ${sign}${retro}`, nakshatra: `${nak}-${pada}` });
        });

        // 2. Generate Moon/Summary Data
        const moonNak = planetData[1].nakshatra.split('-')[0];
        const nextNak = nakshatras[(nakshatras.indexOf(moonNak) + 1) % 27];

        // 3. Generate Timeline Events (Green Area)
        let timeline = [
            `<li class="market-open"><span class="time-label">09:15</span> <strong style="color: var(--green-up)">MARKET OPEN</strong></li>`,
            `<li class="important"><span class="time-label">10:${Math.floor(prng(100)*40)+10}</span> <strong>IMPORTANT PADA SHIFT</strong><span class="sub-text">Watch price action at support/resistance levels</span></li>`,
            `<li><span class="time-label">12:${Math.floor(prng(200)*50)+10}</span> Moon transitions to ${nextNak} Nakshatra</li>`,
            `<li><span class="time-label">14:${Math.floor(prng(300)*50)+10}</span> ${planets[Math.floor(prng(400)*5)+2]} ${Math.floor(prng(500)*180)}° ${planets[Math.floor(prng(600)*5)+2]} (exact aspect)</li>`,
            `<li class="market-close"><span class="time-label">15:30</span> <strong style="color: var(--red-down)">MARKET CLOSE</strong></li>`
        ];

        return { planetData, moonNak, nextNak, timeline };
    }

    // --- Render Engine (Pushes data to HTML) ---
    function renderDashboard(data) {
        // Update Summary
        document.getElementById('live-nakshatra').innerText = data.moonNak;
        document.getElementById('nakshatra-details').innerText = `Active through morning · shifts to ${data.nextNak} intraday`;
        document.getElementById('event-count').innerText = data.timeline.length - 2; // Exclude open/close

        // Update Timeline (Green Area)
        document.getElementById('timeline-list').innerHTML = data.timeline.join('');

        // Update Planetary Snapshot (Blue Area)
        let tableRows = '';
        data.planetData.forEach(p => {
            tableRows += `<tr><td>${p.name}</td><td>${p.degree}</td><td>${p.nakshatra}</td></tr>`;
        });
        document.getElementById('planetary-table').innerHTML = tableRows;
    }

    // Run immediately on load for today's date
    processDashboardUpdate(today);

</script>

</body>
</html>
