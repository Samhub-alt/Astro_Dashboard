<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam Astro | Financial Dashboard</title>
    <style>
        :root {
            /* Premium Dark Mode Trading Terminal Colors */
            --bg-dark: #0B0E14;
            --card-bg: #151A22;
            --text-main: #E2E8F0;
            --text-muted: #8B949E;
            --accent-gold: #D4AF37;
            --accent-purple: #8B5CF6;
            --border-color: #2E3340;
            --green-up: #10B981;
            --red-down: #EF4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            max-width: 950px;
            width: 100%;
        }

        /* --- Header & Calendar --- */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .brand {
            color: var(--accent-gold);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .date-picker {
            background-color: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
        }

        .date-picker:focus { border-color: var(--accent-purple); }
        .date-picker::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* --- Global Card Styles --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, #D4AF37, #9B7B1B);
            color: #0B0E14;
            text-align: center;
            font-weight: 800;
            padding: 6px 20px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        /* --- Top Summary Card --- */
        .top-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .moon-icon {
            width: 70px;
            height: 70px;
            background-color: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-purple);
            font-size: 2.2rem;
            border: 2px solid var(--border-color);
        }

        .summary-text h2 {
            margin: 0 0 5px 0;
            color: var(--accent-gold);
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .summary-text p {
            margin: 4px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .key-events-btn {
            background-color: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* --- Grid Layout for Bottom Section --- */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* --- Timeline Styles (Green Area) --- */
        .timeline {
            list-style: none;
            padding: 0 0 0 10px;
            margin: 0;
            border-left: 1px dashed var(--border-color);
        }

        .timeline li {
            position: relative;
            padding-left: 25px;
            padding-bottom: 25px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .timeline li:last-child { padding-bottom: 0; border-left: none; }

        .timeline li::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid var(--text-muted);
        }

        .timeline li.market-open::before { border-color: var(--green-up); background: var(--green-up); }
        .timeline li.market-close::before { border-color: var(--red-down); background: var(--red-down); }
        .timeline li.important::before { border-color: var(--accent-gold); box-shadow: 0 0 8px rgba(212, 175, 55, 0.6); }

        .time-label {
            font-weight: bold;
            color: var(--accent-gold);
            margin-right: 12px;
            font-family: monospace;
            font-size: 1.05rem;
        }

        .sub-text {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* --- Table Styles (Blue Area) --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        td {
            padding: 12px 5px;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
        }

        td:first-child { color: var(--text-muted); font-weight: 600; width: 30%; }
        td:nth-child(2) { color: var(--text-main); font-family: monospace; font-size: 1.05rem; text-align: left; }
        td:last-child { text-align: right; color: var(--accent-purple); font-weight: 500;}

        @media (max-width: 768px) {
            .bottom-grid { grid-template-columns: 1fr; }
            .top-summary { flex-direction: column; text-align: center; gap: 20px; }
            .header-controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="header-controls">
        <div class="brand">Sam - Astro</div>
        <input type="date" id="calendar-picker" class="date-picker">
    </div>

    <div class="card top-summary">
        <div class="moon-icon">☾</div>
        <div class="summary-text">
            <p style="text-transform: uppercase; font-size: 0.8rem; font-weight: bold; color: var(--accent-purple); letter-spacing: 1px;">Moon Nakshatra Outlook</p>
            <h2 id="live-nakshatra">Calculating...</h2>
            <p id="nakshatra-details">Loading precision data...</p>
            <p style="color: var(--text-main); font-weight: bold;" id="tithi-details">Analyzing Lunar Phase...</p>
        </div>
        <div class="key-events-btn">
            <span id="event-count">0</span> KEY EVENTS<br><span style="font-weight: normal; font-size: 0.8rem; color: var(--text-main);">Scheduled</span>
        </div>
    </div>

    <div class="bottom-grid">
        
        <div class="card">
            <div class="card-header">IST Market Timeline</div>
            <ul class="timeline" id="timeline-list">
                </ul>
        </div>

        <div class="card">
            <div class="card-header">Planetary Snapshot</div>
            <table>
                <tbody id="planetary-table">
                    </tbody>
            </table>
        </div>

    </div>
</div>

<script>
    // --- Astrological Constants ---
    const zodiac = ["Ari", "Tau", "Gem", "Can", "Leo", "Vir", "Lib", "Sco", "Sag", "Cap", "Aqu", "Pis"];
    const nakshatras = ["Ashwini", "Bharani", "Krittika", "Rohini", "Mrigashira", "Ardra", "Punarvasu", "Pushya", "Ashlesha", "Magha", "Purva Phalguni", "Uttara Phalguni", "Hasta", "Chitra", "Swati", "Vishakha", "Anuradha", "Jyeshtha", "Mula", "Purva Ashadha", "Uttara Ashadha", "Shravana", "Dhanishta", "Shatabhisha", "Purva Bhadrapada", "Uttara Bhadrapada", "Revati"];
    const tithis = ["Pratipada", "Dwitiya", "Tritiya", "Chaturthi", "Panchami", "Shashthi", "Saptami", "Ashtami", "Navami", "Dashami", "Ekadashi", "Dwadashi", "Trayodashi", "Chaturdashi", "Purnima", "Pratipada", "Dwitiya", "Tritiya", "Chaturthi", "Panchami", "Shashthi", "Saptami", "Ashtami", "Navami", "Dashami", "Ekadashi", "Dwadashi", "Trayodashi", "Chaturdashi", "Amavasya"];

    // --- Core Mathematical Engine ---
    const AstroEngine = {
        getJD: function(date) {
            return (date.getTime() / 86400000) + 2440587.5;
        },
        norm: function(angle) {
            let a = angle % 360;
            return a < 0 ? a + 360 : a;
        },
        getSunMoon: function(jd) {
            let T = (jd - 2451545.0) / 36525.0; // Centuries from J2000
            
            // Lahiri Ayanamsa Approximation
            let ayanamsa = 24.2884 + (1.396 * T);
            
            // True Sun Longitude
            let M_sun = this.norm(357.52911 + 35999.05029 * T);
            let L_sun = this.norm(280.46646 + 36000.76983 * T);
            let C_sun = (1.9146 - 0.0048 * T) * Math.sin(M_sun * Math.PI/180) + 0.02 * Math.sin(2 * M_sun * Math.PI/180);
            let trueSun = this.norm(L_sun + C_sun);

            // True Moon Longitude (with Major Perturbations for high accuracy)
            let L_moon = this.norm(218.316 + 481267.881 * T);
            let M_moon = this.norm(134.963 + 477198.867 * T);
            let D = this.norm(297.850 + 445267.111 * T);
            
            let pert = 22640 * Math.sin(M_moon * Math.PI/180) 
                     - 4586 * Math.sin((M_moon - 2*D) * Math.PI/180)
                     + 2370 * Math.sin(2*D * Math.PI/180)
                     + 769 * Math.sin(2*M_moon * Math.PI/180)
                     - 668 * Math.sin(M_sun * Math.PI/180);
                     
            let trueMoon = this.norm(L_moon + (pert / 3600.0));
            
            return {
                sun: this.norm(trueSun - ayanamsa),
                moon: this.norm(trueMoon - ayanamsa),
                ayanamsa: ayanamsa
            };
        },
        getAllPlanets: function(date) {
            let jd = this.getJD(date);
            let sm = this.getSunMoon(jd);
            let d = jd - 2451545.0;
            
            // Synodic bounds to keep Mercury and Venus realistically near the Sun
            let mercOffset = 22 * Math.sin((d / 115.88) * 2 * Math.PI);
            let venusOffset = 45 * Math.sin((d / 583.92) * 2 * Math.PI);
            
            // Outer planet Geocentric approximations
            let helioMars = this.norm(355.43 + 0.5240 * d);
            let helioJup = this.norm(34.33 + 0.0831 * d);
            let helioSat = this.norm(50.08 + 0.0334 * d);
            let earth = this.norm(sm.sun + sm.ayanamsa + 180);
            
            let planets = [
                { name: "Sun", deg: sm.sun },
                { name: "Moon", deg: sm.moon },
                { name: "Mercury", deg: this.norm(sm.sun + mercOffset) },
                { name: "Venus", deg: this.norm(sm.sun + venusOffset) },
                { name: "Mars", deg: this.norm(helioMars - sm.ayanamsa + 20 * Math.sin((helioMars - earth) * Math.PI/180)) },
                { name: "Jupiter", deg: this.norm(helioJup - sm.ayanamsa + 10 * Math.sin((helioJup - earth) * Math.PI/180)) },
                { name: "Saturn", deg: this.norm(helioSat - sm.ayanamsa + 6 * Math.sin((helioSat - earth) * Math.PI/180)) },
                { name: "Rahu", deg: this.norm(125.04 - 0.05295 * d - sm.ayanamsa) }
            ];
            
            planets.push({ name: "Ketu", deg: this.norm(planets[7].deg + 180) });
            return planets;
        }
    };

    // --- Formatting Utilities ---
    function formatDegree(deg) {
        let sign = Math.floor(deg / 30);
        let rem = (deg % 30).toFixed(1);
        return `${rem}° ${zodiac[sign]}`;
    }

    function getNakshatra(deg) {
        let nakIndex = Math.floor(deg / 13.333333);
        let pada = Math.floor((deg / 3.333333) % 4) + 1;
        return { name: nakshatras[nakIndex], pada: pada, formatted: `${nakshatras[nakIndex]}-${pada}` };
    }

    // --- Main Rendering Function ---
    function updateDashboard(selectedDateStr) {
        // Calculate data for Market Open (09:15) and Market Close (15:30)
        let openDate = new Date(selectedDateStr + "T09:15:00+05:30");
        let closeDate = new Date(selectedDateStr + "T15:30:00+05:30");

        let openPlanets = AstroEngine.getAllPlanets(openDate);
        let closePlanets = AstroEngine.getAllPlanets(closeDate);

        let moonOpen = openPlanets.find(p => p.name === "Moon").deg;
        let moonClose = closePlanets.find(p => p.name === "Moon").deg;
        let sunOpen = openPlanets.find(p => p.name === "Sun").deg;

        // 1. POPULATE BLUE AREA (Planetary Table)
        let tableHTML = '';
        openPlanets.forEach(p => {
            tableHTML += `<tr><td>${p.name}</td><td>${formatDegree(p.deg)}</td><td>${getNakshatra(p.deg).formatted}</td></tr>`;
        });
        document.getElementById('planetary-table').innerHTML = tableHTML;

        // 2. POPULATE TOP SUMMARY
        let currentNak = getNakshatra(moonOpen);
        document.getElementById('live-nakshatra').innerText = currentNak.name;
        document.getElementById('nakshatra-details').innerText = `Active at Open · Pada ${currentNak.pada}`;

        // Calculate Tithi
        let tithiDiff = AstroEngine.norm(moonOpen - sunOpen);
        let tithiIndex = Math.floor(tithiDiff / 12);
        let paksha = tithiIndex < 15 ? "Shukla" : "Krishna";
        document.getElementById('tithi-details').innerText = `${paksha} ${tithis[tithiIndex]} Tithi`;

        // 3. POPULATE GREEN AREA (Timeline Logic)
        let timelineHTML = `<li class="market-open"><span class="time-label">09:15</span> <span class="event-green">MARKET OPEN</span></li>`;
        let eventCount = 2; // Open and Close

        // Logic: Check for exact Amavasya / Purnima Conjunction
        if (tithiIndex === 14 || tithiIndex === 29) {
            let phase = tithiIndex === 14 ? "Purnima (Full Moon)" : "Amavasya (New Moon)";
            timelineHTML += `<li><span class="time-label">All Day</span> Sun-Moon Conjunction — ${phase}</li>`;
            eventCount++;
        }

        // Logic: Intraday Pada Shift Calculation
        // If the Moon crosses a 3.333° boundary during market hours, calculate the exact minute
        let pOpen = Math.floor(moonOpen / 3.333333);
        let pClose = Math.floor(moonClose / 3.333333);
        if (moonClose < moonOpen) moonClose += 360; // Handle 360 wrap-around

        if (pOpen !== pClose) {
            let boundary = pClose * 3.333333; 
            let fraction = (boundary - moonOpen) / (moonClose - moonOpen);
            let shiftMins = Math.floor(fraction * 375); // 375 = Total Market Mins
            
            let eventHour = Math.floor((9 * 60 + 15 + shiftMins) / 60);
            let eventMin = (9 * 60 + 15 + shiftMins) % 60;
            let timeStr = `${String(eventHour).padStart(2,'0')}:${String(eventMin).padStart(2,'0')}`;
            
            timelineHTML += `<li class="important"><span class="time-label">${timeStr}</span> <strong>IMPORTANT TIME · PADA SHIFT</strong><span class="sub-text">Watch price action as Moon enters Pada ${pClose%4 + 1}</span></li>`;
            eventCount++;
        }

        timelineHTML += `<li class="market-close"><span class="time-label">15:30</span> <span class="event-red">MARKET CLOSE</span></li>`;
        
        document.getElementById('timeline-list').innerHTML = timelineHTML;
        document.getElementById('event-count').innerText = eventCount;
    }

    // --- Initialization ---
    const datePicker = document.getElementById('calendar-picker');
    const today = new Date().toISOString().split('T')[0];
    datePicker.value = today;

    // Trigger calculation when user picks a date
    datePicker.addEventListener('change', function() {
        updateDashboard(this.value);
    });

    // Run immediately for today
    updateDashboard(today);

</script>

</body>
</html>
