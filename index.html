<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam Astro | Advanced Financial Engine</title>
    <style>
        :root {
            --bg-dark: #07090C;
            --card-bg: #12161E;
            --text-main: #E2E8F0;
            --text-muted: #6B7280;
            --accent-gold: #D4AF37;
            --accent-purple: #8B5CF6;
            --border-color: #262D3D;
            --green-up: #10B981;
            --red-down: #EF4444;
            --warning-orange: #F59E0B;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .dashboard-container { max-width: 1000px; width: 100%; }

        /* --- Header --- */
        .header-controls {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--card-bg); padding: 15px 25px;
            border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color);
        }
        .brand { color: var(--accent-gold); font-weight: 800; font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; }
        .date-picker {
            background-color: var(--bg-dark); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 10px;
            border-radius: 6px; font-size: 1rem; cursor: pointer; outline: none;
        }
        .date-picker::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* --- Global Cards --- */
        .card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 25px; margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #D4AF37, #9B7B1B); color: #000;
            font-weight: 800; padding: 6px 15px; border-radius: 4px;
            display: inline-block; margin-bottom: 20px; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;
        }

        /* --- Warning Box --- */
        .warning-box {
            background: rgba(245, 158, 11, 0.05); border-left: 4px solid var(--warning-orange);
            padding: 15px 20px; border-radius: 0 8px 8px 0; margin-bottom: 20px;
        }
        .warning-box h4 { margin: 0 0 5px 0; color: var(--warning-orange); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .warning-box p { margin: 0; font-size: 0.95rem; color: #D1D5DB; }

        /* --- Summary --- */
        .top-summary { display: flex; align-items: center; justify-content: space-between; }
        .moon-icon {
            width: 70px; height: 70px; background: var(--bg-dark); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-purple); font-size: 2rem; border: 2px solid var(--border-color);
        }
        .summary-text { flex-grow: 1; margin-left: 20px; }
        .summary-text h2 { margin: 0; color: var(--accent-gold); font-size: 2rem; }
        .summary-text p { margin: 4px 0; color: var(--text-muted); font-size: 0.95rem; }
        .key-events-btn {
            background-color: rgba(139, 92, 246, 0.1); border: 1px solid var(--accent-purple);
            color: var(--accent-purple); padding: 12px 20px; border-radius: 8px;
            text-align: center; font-weight: bold; min-width: 100px;
        }

        /* --- Grid Layout --- */
        .bottom-grid { display: grid; grid-template-columns: 1.1fr 1.4fr; gap: 20px; }

        /* --- Timeline (Green Area) --- */
        .timeline { list-style: none; padding: 0 0 0 10px; margin: 0; border-left: 1px dashed var(--border-color); }
        .timeline li { position: relative; padding-left: 25px; padding-bottom: 25px; font-size: 0.95rem; }
        .timeline li:last-child { padding-bottom: 0; border-left: none; }
        .timeline li::before {
            content: ''; position: absolute; left: -6px; top: 4px; width: 10px; height: 10px;
            border-radius: 50%; background: var(--card-bg); border: 2px solid var(--text-muted);
        }
        
        .timeline li.market-open::before { border-color: var(--green-up); background: var(--green-up); box-shadow: 0 0 8px rgba(16,185,129,0.4); }
        .timeline li.market-close::before { border-color: var(--red-down); background: var(--red-down); box-shadow: 0 0 8px rgba(239,68,68,0.4); }
        .timeline li.important::before { border-color: var(--warning-orange); box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
        .timeline li.ingress::before { border-color: var(--accent-gold); background: var(--accent-gold); }
        .timeline li.aspect::before { border-color: var(--accent-purple); }
        
        /* Dim events outside of trading hours to match the mockup feel */
        .timeline li.pre-market, .timeline li.post-market { opacity: 0.7; }
        
        .time-label { font-weight: bold; color: var(--accent-gold); margin-right: 12px; font-family: monospace; }
        .sub-text { display: block; font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

        /* --- Table (Blue Area) --- */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { text-align: left; padding: 10px 5px; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--border-color); }
        td { padding: 12px 5px; font-size: 0.95rem; border-bottom: 1px solid var(--border-color); }
        td:nth-child(1) { color: var(--text-main); font-weight: 600; }
        td:nth-child(2) { font-family: monospace; color: #D1D5DB; }
        td:nth-child(3) { color: var(--accent-purple); }
        td:nth-child(4) { font-size: 0.8rem; text-align: right; }
        
        .badge-combust { background: rgba(239, 68, 68, 0.1); color: var(--red-down); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--red-down); }
        .badge-rx { background: rgba(139, 92, 246, 0.1); color: var(--accent-purple); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--accent-purple); }

        @media (max-width: 768px) {
            .bottom-grid { grid-template-columns: 1fr; }
            .header-controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-controls">
        <div class="brand">Sam - Astro Engine</div>
        <input type="date" id="calendar-picker" class="date-picker">
    </div>

    <div class="warning-box" id="chetavani-box">
        <h4>Market Chetavani (Guidelines)</h4>
        <p id="chetavani-text">Analyzing daily planetary geometries...</p>
    </div>

    <div class="card top-summary">
        <div class="moon-icon">☾</div>
        <div class="summary-text">
            <p style="text-transform: uppercase; font-size: 0.8rem; font-weight: bold; color: var(--accent-purple); letter-spacing: 1px;">Moon Nakshatra Outlook</p>
            <h2 id="live-nakshatra">Calculating...</h2>
            <p id="nakshatra-details">Loading precision data...</p>
            <p style="color: var(--text-main); font-weight: bold;" id="tithi-details">Analyzing Lunar Phase...</p>
        </div>
        <div class="key-events-btn">
            <span id="event-count" style="font-size: 1.2rem;">0</span> <br>
            <span style="font-weight: normal; font-size: 0.75rem; color: var(--text-main); text-transform: uppercase;">Events</span>
        </div>
    </div>

    <div class="bottom-grid">
        <div class="card">
            <div class="card-header">24-Hour IST Timeline</div>
            <ul class="timeline" id="timeline-list"></ul>
        </div>

        <div class="card">
            <div class="card-header">Deep Planetary Snapshot</div>
            <table>
                <thead>
                    <tr><th>Planet</th><th>Degree & Sign</th><th>Nakshatra-Pada</th><th>Status</th></tr>
                </thead>
                <tbody id="planetary-table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const zodiac = ["Ari", "Tau", "Gem", "Can", "Leo", "Vir", "Lib", "Sco", "Sag", "Cap", "Aqu", "Pis"];
    const nakshatras = ["Ashwini", "Bharani", "Krittika", "Rohini", "Mrigashira", "Ardra", "Punarvasu", "Pushya", "Ashlesha", "Magha", "Purva Phalguni", "Uttara Phalguni", "Hasta", "Chitra", "Swati", "Vishakha", "Anuradha", "Jyeshtha", "Mula", "Purva Ashadha", "Uttara Ashadha", "Shravana", "Dhanishta", "Shatabhisha", "Purva Bhadrapada", "Uttara Bhadrapada", "Revati"];
    const tithis = ["Pratipada", "Dwitiya", "Tritiya", "Chaturthi", "Panchami", "Shashthi", "Saptami", "Ashtami", "Navami", "Dashami", "Ekadashi", "Dwadashi", "Trayodashi", "Chaturdashi", "Purnima", "Pratipada", "Dwitiya", "Tritiya", "Chaturthi", "Panchami", "Shashthi", "Saptami", "Ashtami", "Navami", "Dashami", "Ekadashi", "Dwadashi", "Trayodashi", "Chaturdashi", "Amavasya"];
    const gandaMoola = [0, 8, 9, 17, 18, 26]; 

    const AstroEngine = {
        getJD: function(date) { return (date.getTime() / 86400000) + 2440587.5; },
        norm: function(angle) { let a = angle % 360; return a < 0 ? a + 360 : a; },
        getAllPlanets: function(date) {
            let jd = this.getJD(date);
            let T = (jd - 2451545.0) / 36525.0;
            let d = jd - 2451545.0;
            let ayanamsa = 24.2884 + (1.396 * T);
            
            let M_sun = this.norm(357.529 + 35999.05 * T);
            let trueSun = this.norm(280.466 + 36000.77 * T + 1.915 * Math.sin(M_sun * Math.PI/180));
            let L_moon = this.norm(218.316 + 481267.881 * T);
            let M_moon = this.norm(134.963 + 477198.867 * T);
            let D = this.norm(297.850 + 445267.111 * T);
            let pert = 22640 * Math.sin(M_moon * Math.PI/180) - 4586 * Math.sin((M_moon - 2*D) * Math.PI/180);
            let trueMoon = this.norm(L_moon + (pert / 3600.0));

            let mercOffset = 22 * Math.sin((d / 115.88) * 2 * Math.PI);
            let venusOffset = 45 * Math.sin((d / 583.92) * 2 * Math.PI);
            let helioMars = this.norm(355.43 + 0.5240 * d);
            let helioJup = this.norm(34.33 + 0.0831 * d);
            let helioSat = this.norm(50.08 + 0.0334 * d);
            let helioUra = this.norm(313.23 + 0.0117 * d);
            let helioNep = this.norm(304.88 + 0.0060 * d);
            let helioPlu = this.norm(238.92 + 0.0040 * d);
            let earth = this.norm(trueSun + 180);

            return [
                { id: "su", name: "Sun", deg: this.norm(trueSun - ayanamsa) },
                { id: "mo", name: "Moon", deg: this.norm(trueMoon - ayanamsa) },
                { id: "me", name: "Mercury", deg: this.norm((trueSun + mercOffset) - ayanamsa) },
                { id: "ve", name: "Venus", deg: this.norm((trueSun + venusOffset) - ayanamsa) },
                { id: "ma", name: "Mars", deg: this.norm(helioMars - ayanamsa + 20 * Math.sin((helioMars - earth) * Math.PI/180)) },
                { id: "ju", name: "Jupiter", deg: this.norm(helioJup - ayanamsa + 10 * Math.sin((helioJup - earth) * Math.PI/180)) },
                { id: "sa", name: "Saturn", deg: this.norm(helioSat - ayanamsa + 6 * Math.sin((helioSat - earth) * Math.PI/180)) },
                { id: "ra", name: "Rahu", deg: this.norm(125.04 - 0.05295 * d - ayanamsa) },
                { id: "ke", name: "Ketu", deg: this.norm((125.04 - 0.05295 * d - ayanamsa) + 180) },
                { id: "ur", name: "Uranus", deg: this.norm(helioUra - ayanamsa) },
                { id: "ne", name: "Neptune", deg: this.norm(helioNep - ayanamsa) },
                { id: "pl", name: "Pluto", deg: this.norm(helioPlu - ayanamsa) }
            ];
        }
    };

    function processDashboard(dateStr) {
        let openDate = new Date(dateStr + "T09:15:00+05:30");
        let openPlanets = AstroEngine.getAllPlanets(openDate);
        let sunDeg = openPlanets[0].deg;
        let moonDeg = openPlanets[1].deg;

        // --- 1. Populate Table ---
        let tableHTML = '';
        let warnings = [];
        openPlanets.forEach(p => {
            let sign = Math.floor(p.deg / 30);
            let rem = (p.deg % 30).toFixed(1);
            let nakIndex = Math.floor(p.deg / 13.333333);
            let pada = Math.floor((p.deg / 3.333333) % 4) + 1;
            
            let statusHTML = "";
            let distFromSun = Math.min(Math.abs(p.deg - sunDeg), 360 - Math.abs(p.deg - sunDeg));

            if (!['su', 'mo', 'ra', 'ke', 'ur', 'ne', 'pl'].includes(p.id)) {
                if (distFromSun < 8) {
                    statusHTML += `<span class="badge-combust">Combust</span> `;
                    if (p.id === 'me') warnings.push("Mercury is Combust: Erratic volume expected.");
                }
                if (['ju', 'sa', 'ma'].includes(p.id) && distFromSun > 120 && distFromSun < 240) {
                    statusHTML += `<span class="badge-rx">Retrograde</span> `;
                }
            }

            tableHTML += `<tr><td>${p.name}</td><td>${rem}° ${zodiac[sign]}</td><td>${nakshatras[nakIndex]}-${pada}</td><td>${statusHTML}</td></tr>`;
        });
        document.getElementById('planetary-table').innerHTML = tableHTML;

        // --- 2. Top Summary ---
        let nakIndex = Math.floor(moonDeg / 13.333333);
        document.getElementById('live-nakshatra').innerText = nakshatras[nakIndex];
        document.getElementById('nakshatra-details').innerText = `Active at Open · Pada ${Math.floor((moonDeg / 3.333333) % 4) + 1}`;
        let tithiDiff = AstroEngine.norm(moonDeg - sunDeg);
        let tithiIndex = Math.floor(tithiDiff / 12);
        document.getElementById('tithi-details').innerText = `${tithiIndex < 15 ? "Shukla" : "Krishna"} ${tithis[tithiIndex]} Tithi`;

        // --- 3. Chetavani ---
        if (gandaMoola.includes(nakIndex)) warnings.push(`Moon in Ganda Moola: Highly volatile sentiment.`);
        if (tithiIndex === 14 || tithiIndex === 29) warnings.push(`Amavasya/Purnima Phase: Market may form a top or bottom today.`);
        let chetavaniBox = document.getElementById('chetavani-text');
        chetavaniBox.innerHTML = warnings.length > 0 ? `<ul><li>${warnings.join('</li><li>')}</li></ul>` : "No extreme astrological friction detected. Trade standard price action.";

        // --- 4. The 24-Hour Timeline Engine ---
        let dayEvents = [];
        let startOfDay = new Date(dateStr + "T00:00:00+05:30");
        
        // Loop through all 24 hours of the day to catch EVERYTHING
        for (let i = 0; i < 24; i++) {
            let t1 = new Date(startOfDay.getTime() + i * 3600000);
            let t2 = new Date(startOfDay.getTime() + (i + 1) * 3600000);
            let pl1 = AstroEngine.getAllPlanets(t1);
            let pl2 = AstroEngine.getAllPlanets(t2);

            let moon1 = pl1[1].deg, moon2 = pl2[1].deg;
            if (moon1 > moon2) moon2 += 360;

            // A. Pada Shifts
            let p1 = Math.floor(moon1 / 3.333333), p2 = Math.floor(moon2 / 3.333333);
            if (p1 !== p2) {
                let frac = ((p2 * 3.333333) - moon1) / (moon2 - moon1);
                dayEvents.push({ mins: (i * 60) + Math.floor(frac * 60), type: "important", html: "<strong>IMPORTANT TIME · PADA SHIFT</strong><span class='sub-text'>Watch price action at your levels</span>" });
            }

            // B. Nakshatra Shifts
            let n1 = Math.floor(moon1 / 13.333333), n2 = Math.floor(moon2 / 13.333333);
            if (n1 !== n2) {
                let frac = ((n2 * 13.333333) - moon1) / (moon2 - moon1);
                dayEvents.push({ mins: (i * 60) + Math.floor(frac * 60), type: "ingress", html: `Moon enters <strong>${nakshatras[n2]}</strong> nakshatra` });
            }

            // C. All Planet Sign Changes (Sankranti/Ingress)
            pl1.forEach((p, idx) => {
                let s1 = Math.floor(p.deg / 30), s2 = Math.floor(pl2[idx].deg / 30);
                if (s1 !== s2 && Math.abs(p.deg - pl2[idx].deg) < 10) { // Avoid false positive on 360 wrap
                    let frac = ((s2 * 30) - p.deg) / (pl2[idx].deg - p.deg);
                    dayEvents.push({ mins: (i * 60) + Math.floor(frac * 60), type: "ingress", html: `${p.name} enters <strong>${zodiac[s2]}</strong>` });
                }
            });

            // D. Cross-Planet Aspects (0, 90, 120, 135, 180)
            let fast = [0, 1, 2, 3, 4]; // Sun, Moon, Merc, Ven, Mars
            let angles = [0, 90, 120, 135, 180];
            
            fast.forEach(f => {
                for (let s = f + 1; s < pl1.length; s++) {
                    let rel1 = AstroEngine.norm(pl1[f].deg - pl1[s].deg);
                    let rel2 = AstroEngine.norm(pl2[f].deg - pl2[s].deg);
                    
                    angles.forEach(ang => {
                        // Check if relative angle crosses the target during this hour
                        let crossed = false;
                        if (ang === 0 && rel1 > 350 && rel2 < 10) crossed = true;
                        else if (rel1 <= ang && rel2 > ang && Math.abs(rel1 - rel2) < 5) crossed = true;
                        
                        if (crossed) {
                            let effect = ang === 0 && f === 0 && s === 1 ? "Amavasya / New Moon" : "(exact)";
                            dayEvents.push({ mins: (i * 60) + 30, type: "aspect", html: `${pl1[f].name} <strong>${ang}°</strong> ${pl1[s].name} <span class='sub-text'>${effect}</span>` });
                        }
                    });
                }
            });
        }

        // Add Fixed Market Open/Close
        dayEvents.push({ mins: (9 * 60) + 15, type: "market-open", html: "<strong>MARKET OPEN</strong>", fixed: true });
        dayEvents.push({ mins: (15 * 60) + 30, type: "market-close", html: "<strong>MARKET CLOSE</strong>", fixed: true });

        // Sort events chronologically
        dayEvents.sort((a, b) => a.mins - b.mins);
        
        let validEventsCount = 0;
        let timelineHTML = "";
        
        dayEvents.forEach(evt => {
            let h = Math.floor(evt.mins / 60);
            let m = evt.mins % 60;
            let timeClass = "";
            
            // Determine if pre/post market for styling
            if (evt.mins < (9 * 60) + 15) timeClass = "pre-market";
            else if (evt.mins > (15 * 60) + 30) timeClass = "post-market";
            
            if (!evt.fixed) validEventsCount++;
            
            timelineHTML += `<li class="${evt.type} ${timeClass}"><span class="time-label">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}</span> ${evt.html}</li>`;
        });

        document.getElementById('event-count').innerText = validEventsCount;
        document.getElementById('timeline-list').innerHTML = timelineHTML;
    }

    const datePicker = document.getElementById('calendar-picker');
    const today = new Date().toISOString().split('T')[0];
    datePicker.value = today;
    datePicker.addEventListener('change', function() { processDashboard(this.value); });
    processDashboard(today);
</script>

</body>
</html>
